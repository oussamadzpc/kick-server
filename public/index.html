<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Admin Panel</title>
</head>
<body>

<h1>Admin Panel</h1>

<button onclick="loadRequests()">Load Requests</button>
<div id="requests"></div>

<script>

const BASE_URL = "https://kick-server-4c5d.onrender.com"; // ✅ التعديل الوحيد

const ADMIN_KEY = "2107";

async function loadRequests() {
  const res = await fetch(BASE_URL + "/admin/requests", {
    headers: {
      "x-admin-key": ADMIN_KEY
    }
  });

  const data = await res.json();

  const box = document.getElementById("requests");
  box.innerHTML = "";

  data.forEach(user => {
    const div = document.createElement("div");

    div.innerHTML = `
      <b>${user.channel}</b>
      <button onclick="approve('${user.id}')">Approve</button>
      <button onclick="reject('${user.id}')">Reject</button>
      <button onclick="block('${user.id}')">Block</button>
      <hr>
    `;

    box.appendChild(div);
  });
}

async function approve(id) {
  await fetch(BASE_URL + "/admin/update", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "x-admin-key": ADMIN_KEY
    },
    body: JSON.stringify({ id, status: "approved" })
  });

  loadRequests();
}

async function reject(id) {
  await fetch(BASE_URL + "/admin/update", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "x-admin-key": ADMIN_KEY
    },
    body: JSON.stringify({ id, status: "rejected" })
  });

  loadRequests();
}

async function block(id) {
  await fetch(BASE_URL + "/admin/block", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "x-admin-key": ADMIN_KEY
    },
    body: JSON.stringify({ id })
  });

  loadRequests();
}

</script>

</body>
</html>
