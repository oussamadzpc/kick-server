<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Admin Panel</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #0f172a;
  color: #e2e8f0;
}

h1 {
  text-align: center;
  padding: 20px;
  margin: 0;
  background: #020617;
  border-bottom: 1px solid #1e293b;
}

.top-bar {
  display: flex;
  justify-content: center;
  gap: 10px;
  padding: 15px;
}

input {
  padding: 8px;
  border-radius: 8px;
  border: none;
  width: 250px;
}

button {
  border: none;
  padding: 8px 14px;
  border-radius: 8px;
  cursor: pointer;
  font-weight: bold;
}

.load-btn { background: #3b82f6; color: white; }
.delete-btn { background: #ef4444; color: white; }
.start-ver-btn { background: #22c55e; color: white; }
.stop-ver-btn { background: #ef4444; color: white; }

.container {
  display: flex;
  gap: 20px;
  padding: 20px;
}

.table-box {
  flex: 1;
  background: #020617;
  border: 1px solid #1e293b;
  border-radius: 12px;
  padding: 10px;
  max-height: 500px;
  overflow-y: auto;
}

.count {
  font-size: 14px;
  margin-bottom: 10px;
  opacity: 0.8;
}

table {
  width: 100%;
  border-collapse: collapse;
  text-align: left;
}

th, td {
  padding: 10px;
  border-bottom: 1px solid #1e293b;
  vertical-align: middle;
}

th {
  position: sticky;
  top: 0;
  background: #020617;
}

th:first-child,
td:first-child {
  width: 40px;
  text-align: center;
}

.status-approved { color: #22c55e; }
.status-pending { color: #f59e0b; }

.deleted-flag {
  color: #facc15;
  font-size: 12px;
  margin-left: 6px;
}

.actions button {
  margin-right: 5px;
}

.actions button:nth-child(1) { background: #22c55e; color: white; }
.actions button:nth-child(2) { background: #f59e0b; color: white; }
.actions button:nth-child(3) { background: #ef4444; color: white; }

/* 👑 VIP */
.vip-badge {
  color: gold;
  margin-left: 6px;
}
</style>
</head>

<body>

<h1>Admin Panel</h1>

<div class="top-bar">
  <input type="text" id="search" placeholder="Search channel..." oninput="render()">
  <button class="load-btn" onclick="loadRequests()">Load</button>
  <button class="delete-btn" onclick="deleteSelected()">Delete Selected</button>

  <button class="start-ver-btn" onclick="startVerification()">Start Verification</button>
  <button class="stop-ver-btn" onclick="stopVerification()">Stop Verification</button>

  <button class="start-ver-btn" onclick="setVIP()">Set VIP</button>
  <button class="delete-btn" onclick="removeVIP()">Remove VIP</button>
<span id="verStatus" style="
  margin-left:10px;
  padding:6px 12px;
  border-radius:20px;
  font-weight:bold;
  background:#334155;
">
  ⚪ Stopped
</span>
</div>

<div class="container">

  <div class="table-box">
    <h3>👑 VIP</h3>
    <div class="count" id="vipCount">0</div>
    <table>
      <thead>
        <tr>
          <th><input type="checkbox" onclick="toggleAll(this)"></th>
          <th>Channel</th>
          <th>Status</th>
        </tr>
      </thead>
      <tbody id="vip"></tbody>
    </table>
  </div>

  <div class="table-box">
    <h3>Pending</h3>
    <div class="count" id="pendingCount">0</div>
    <table>
      <thead>
        <tr>
          <th><input type="checkbox" onclick="toggleAll(this)"></th>
          <th>Channel</th>
          <th>Status</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody id="pending"></tbody>
    </table>
  </div>

  <div class="table-box">
    <h3>Approved</h3>
    <div class="count" id="approvedCount">0</div>
    <table>
      <thead>
        <tr>
          <th><input type="checkbox" onclick="toggleAll(this)"></th>
          <th>Channel</th>
          <th>Status</th>
        </tr>
      </thead>
      <tbody id="approved"></tbody>
    </table>
  </div>

</div>

<script>
const SUPABASE_URL = "https://pdgglivspfctmzbjpqjm.supabase.co/rest/v1/users";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBkZ2dsaXZzcGZjdG16YmpwcWptIiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImlhdCI6MTc3NzMxMjMxNSwiZXhwIjoyMDkyODg4MzE1fQ.9jX9dbGuGqcSkyj_ZYkqunjXQTAcO5eWx27tqNiRdg0";

const BASE_URL = "https://kick-server-4c5d.onrender.com";
const ADMIN_KEY = "2107";

let allData = [];
let deletedList = [];
let vipList = [];

const enteredKey = prompt("Enter Admin Password:");
if (enteredKey !== ADMIN_KEY) {
  document.body.innerHTML = "<h1 style='text-align:center;margin-top:50px;'>Access Denied</h1>";
  throw new Error("Unauthorized");
}

async function loadRequests() {
  const res = await fetch(SUPABASE_URL, {
    headers: { "apikey": SUPABASE_KEY }
  });

  allData = await res.json();

  const deletedRes = await fetch(SUPABASE_URL + "?is_deleted=eq.true", {
    headers: { "apikey": SUPABASE_KEY }
  });

  deletedList = await deletedRes.json();

  try {
    const vipRes = await fetch(BASE_URL + "/sync");
    const vipData = await vipRes.json();
    vipList = vipData.vipChannels || [];
updateVerificationStatus(vipData.verificationActive);
  } catch {}

  allData = allData.filter(u => u.is_deleted !== true);
  allData.sort((a,b)=> new Date(b.created_at)-new Date(a.created_at));

  render();
}

function render() {
  const search = document.getElementById("search").value.toLowerCase();

  const pendingBox = document.getElementById("pending");
  const approvedBox = document.getElementById("approved");
  const vipBox = document.getElementById("vip");

  let pendingCount = 0;
  let approvedCount = 0;
  let vipCount = 0;

  pendingBox.innerHTML = "";
  approvedBox.innerHTML = "";
  vipBox.innerHTML = "";

  allData.forEach(user => {

    if (!user.channel.toLowerCase().includes(search)) return;

    const isVIP = vipList.includes(user.channel);
    const isDeleted = deletedList.some(d => d.channel === user.channel);
    const flag = isDeleted ? '<span class="deleted-flag">⚠</span>' : '';

    const row = document.createElement("tr");
    const isApproved = user.approved === true;

    if (isVIP) {
      vipCount++;
      row.innerHTML = `
        <td><input type="checkbox" class="select" data-channel="${user.channel}"></td>
        <td>${user.channel} <span class="vip-badge">👑</span> ${flag}</td>
        <td class="status-approved">VIP</td>
      `;
      vipBox.appendChild(row);
    } else if (isApproved) {
      approvedCount++;
      row.innerHTML = `
        <td><input type="checkbox" class="select" data-id="${user.id}" data-channel="${user.channel}"></td>
        <td>${user.channel} ${flag}</td>
        <td class="status-approved">Approved</td>
      `;
      approvedBox.appendChild(row);
    } else {
      pendingCount++;
      row.innerHTML = `
        <td><input type="checkbox" class="select" data-id="${user.id}" data-channel="${user.channel}"></td>
        <td>${user.channel} ${flag}</td>
        <td class="status-pending">Pending</td>
        <td class="actions">
          <button onclick="approve('${user.channel}')">✔</button>
          <button onclick="reject('${user.id}')">✖</button>
          <button onclick="block('${user.id}')">⛔</button>
        </td>
      `;
      pendingBox.appendChild(row);
    }

  });

  document.getElementById("pendingCount").textContent = "Total: " + pendingCount;
  document.getElementById("approvedCount").textContent = "Total: " + approvedCount;
  document.getElementById("vipCount").textContent = "Total: " + vipCount;
}

function toggleAll(source) {
  document.querySelectorAll(".select").forEach(cb => {
    cb.checked = source.checked;
  });
}

async function startVerification() {
  const selected = document.querySelectorAll("#approved .select:checked");
  if (selected.length === 0) {
    alert("Select VIP channels first");
    return;
  }

  const channels = [];
  selected.forEach(cb => channels.push(cb.dataset.channel));

  await fetch(BASE_URL + "/admin/start-verification", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "x-admin-key": ADMIN_KEY
    },
    body: JSON.stringify({ channels })
  });

  alert("Verification Started");
updateVerificationStatus(true);
}

async function stopVerification() {
  await fetch(BASE_URL + "/admin/stop-verification", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "x-admin-key": ADMIN_KEY
    }
  });

  alert("Verification Stopped");
updateVerificationStatus(false);
}

async function deleteSelected() {
  const selected = document.querySelectorAll(".select:checked");
  if (selected.length === 0) {
    alert("Select users first");
    return;
  }

  if (!confirm("Are you sure?")) return;

  for (let cb of selected) {
    const id = cb.dataset.id;
    const channel = cb.dataset.channel;

    await fetch(BASE_URL + "/admin/delete-user", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "x-admin-key": ADMIN_KEY
      },
      body: JSON.stringify({ id, channel })
    });
  }

  await loadRequests();
}

async function approve(channel) {
  try {
    const res = await fetch(BASE_URL + "/admin/update", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "x-admin-key": ADMIN_KEY
      },
      body: JSON.stringify({ channel, approved: true })
    });

    const data = await res.json();
    console.log("APPROVE:", data);

    await loadRequests();

  } catch (err) {
    console.log("APPROVE ERROR:", err);
  }
}

async function reject(id) {
  await fetch(BASE_URL + "/admin/update", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "x-admin-key": ADMIN_KEY
    },
    body: JSON.stringify({ id, status: "rejected" })
  });
  await loadRequests();
}

async function block(id) {
  await fetch(BASE_URL + "/admin/block", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "x-admin-key": ADMIN_KEY
    },
    body: JSON.stringify({ id })
  });
  await loadRequests();
}

async function setVIP() {
  const selected = document.querySelectorAll("#approved .select:checked");

  if (selected.length === 0) {
    alert("Select channels to set VIP");
    return;
  }

  const channels = [];
  selected.forEach(cb => channels.push(cb.dataset.channel));

  try {
    const res = await fetch(BASE_URL + "/admin/set-vip", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "x-admin-key": ADMIN_KEY
      },
      body: JSON.stringify({ channels })
    });

    const data = await res.json();
    console.log("VIP SET:", data);

    alert("VIP updated successfully");
    await loadRequests();

  } catch (err) {
    console.log("VIP ERROR:", err);
    alert("VIP update failed");
  }
}

async function removeVIP() {
  const selected = document.querySelectorAll("#vip .select:checked");

  if (selected.length === 0) {
    alert("Select VIP channels first");
    return;
  }

  const channels = [];
  selected.forEach(cb => channels.push(cb.dataset.channel));

  await fetch(BASE_URL + "/admin/remove-vip", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "x-admin-key": ADMIN_KEY
    },
    body: JSON.stringify({ channels })
  });

  alert("VIP removed");
  await loadRequests();
}

loadRequests();
</script>
<script>

// كودك الحالي هنا...

function updateVerificationStatus(active) {
  const el = document.getElementById("verStatus");
  if (!el) return;

  if (active) {
    el.textContent = "🟢 Verification ON";
    el.style.background = "#14532d";
  } else {
    el.textContent = "🔴 Verification OFF";
    el.style.background = "#7f1d1d";
  }
}

</script>

</body>
</html>
